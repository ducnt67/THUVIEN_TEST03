<div class="pm-modal" id="popup-borrow-detail">
    <div class="pm-title-block">
        <h3 class="pm-title">Chi tiết phiếu mượn</h3>
    </div>
    <div class="pm-body">
        <div class="pm-grid-4">
            <div class="pm-field">
                <label class="pm-label">Mã người dùng</label>
                <input id="detUserId" class="pm-input" type="text" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Tên người dùng</label>
                <input id="detUserName" class="pm-input" type="text" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Ngày mượn</label>
                <input id="detBorrowDate" class="pm-input" type="date" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Ngày đến hạn trả</label>
                <input id="detDueDate" class="pm-input" type="date">
            </div>
        </div>

        <div class="pm-list-hdr">
            <span>Mã sách trong kho</span>
            <span>Tên sách</span>
            <span>Số lượng</span>
        </div>
        <div id="detBooksBody"></div>
    </div>
    <div class="pm-footer">
        <button class="btn-cancel" type="button" onclick="closePm()">Hủy</button>
        <button class="btn-save" type="button" onclick="saveDetailChanges()">Lưu thay đổi</button>
    </div>
</div>

<div class="pm-modal-sm" id="popup-extend-small">
    <div class="pm-header-sm">
        <div>
            <h3 class="pm-title">Gia hạn mượn sách</h3>
            <p class="pm-subtitle">Cập nhật ngày gia hạn cho phiếu mượn</p>
        </div>
        <button class="pm-x-btn" onclick="closePm()">×</button>
    </div>
    <div class="pm-body-sm">
        <div class="pm-info-grid">
            <div>
                <div class="pm-info-label">Mã người dùng</div>
                <div class="pm-info-value" id="extSmUserId">–</div>
            </div>
            <div>
                <div class="pm-info-label">Họ và tên</div>
                <div class="pm-info-value" id="extSmUserName">–</div>
            </div>
            <div>
                <div class="pm-info-label">Mã sách</div>
                <div class="pm-info-value" id="extSmBookCode">–</div>
            </div>
            <div>
                <div class="pm-info-label">Tên sách</div>
                <div class="pm-info-value" id="extSmBookTitle">–</div>
            </div>
        </div>
        <div class="pm-field" style="margin-bottom:4px;">
            <label class="pm-label">Ngày gia hạn mới <span class="req">*</span></label>
            <input id="extSmNewDate" class="pm-input" type="date">
        </div>
    </div>
    <div class="pm-footer-sm">
        <button class="btn-cancel" onclick="closePm()">Hủy</button>
        <button class="btn-save" onclick="saveExtendSmall()">Lưu</button>
    </div>
</div>

<div class="pm-modal" id="popup-extend-large">
    <div class="pm-title-block">
        <h3 class="pm-title">Gia hạn ngày trả sách</h3>
    </div>
    <div class="pm-body">
        <div class="pm-grid-4">
            <div class="pm-field">
                <label class="pm-label">Mã người dùng</label>
                <input id="extLgUserId" class="pm-input" type="text" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Tên người dùng</label>
                <input id="extLgUserName" class="pm-input" type="text" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Ngày đến hạn trả</label>
                <input id="extLgCurrentDue" class="pm-input" type="date" readonly>
            </div>
            <div class="pm-field">
                <label class="pm-label">Ngày đến hạn trả mới <span class="req">*</span></label>
                <input id="extLgNewDue" class="pm-input" type="date">
            </div>
        </div>

        <div class="pm-list-hdr">
            <span>Mã sách trong kho</span>
            <span>Tên sách</span>
            <span>Số lượng</span>
        </div>
        <div id="extLgBooksBody"></div>
    </div>
    <div class="pm-footer">
        <button class="btn-cancel" type="button" onclick="closePm()">Hủy</button>
        <button class="btn-save" type="button" onclick="saveExtendLarge()">Lưu thay đổi</button>
    </div>
</div>
