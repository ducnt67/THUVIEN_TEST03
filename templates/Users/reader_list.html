{% block popup %}
<div id="userModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-content user-modal">
        <div class="modal-header">
            <div>
                <h2 class="modal-title">Chi tiết người dùng</h2>
                <p class="modal-subtitle">Thông tin hồ sơ và trạng thái hiện tại</p>
            </div>
            <button type="button" id="closeModalBtn" class="modal-close" aria-label="Đóng">&times;</button>
        </div>

        <div class="user-details-grid">
            <div class="detail-box">
                <label>Mã người dùng</label>
                <div class="detail-value" id="modalUserId">-</div>
            </div>
            <div class="detail-box">
                <label>Họ tên</label>
                <div class="detail-value" id="modalUserName">-</div>
            </div>
            <div class="detail-box">
                <label>Email</label>
                <div class="detail-value" id="modalUserEmail">-</div>
            </div>
            <div class="detail-box">
                <label>Số điện thoại</label>
                <div class="detail-value" id="modalUserPhone">-</div>
            </div>
        </div>

        <div class="status-panel">
            <div class="status-header">Tình trạng</div>
            <div class="status-body">
                <div class="status-item">
                    <div class="icon-box blue"><i class='bx bx-book-open'></i></div>
                    <div>
                        <span class="status-label">Số sách đang mượn</span>
                        <span class="status-number blue-text" id="modalBooks">0</span>
                    </div>
                </div>
                <div class="status-divider"></div>
                <div class="status-item">
                    <div class="icon-box orange"><i class='bx bx-receipt'></i></div>
                    <div>
                        <span class="status-label">Tiền phạt còn nợ</span>
                        <span class="status-number orange-text" id="modalFine">0đ</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-actions">
            <button id="closeModalFooterBtn" class="btn btn-primary btn-orange" type="button">Đóng</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/user.js' %}"></script>
{% endblock %}
