<div id="editBookModal" class="modal" style="display: none;">
    <div class="modal-content form-box">
        <span class="close-modal" onclick="closeSubModal('addBookModal')">&times;</span>
        <div class="modal-header-text">
            <h2 id="editModalTitle">Chỉnh sửa thông tin sách</h2>
            <p id="editModalSubtitle" class="modal-subtitle">Cập nhật thông tin sách</p>
        </div>

        <form id="editBookForm" method="POST">
            {% csrf_token %}
            <input type="hidden" name="action" value="update">
            <input type="hidden" id="editOriginalId" name="original_id">
            <input type="hidden" id="editBookId" name="book_id">

            <div class="form-grid">
                <div class="form-group">
                    <label>Tên sách <span style="color: red;">*</span></label>
                    <input type="text" id="editBookTitle" name="title">
                    <span class="error-msg" id="err-edit-title"></span>
                </div>

                <div class="form-group">
                    <label>Tác giả <span style="color: red;">*</span></label>
                    <input type="text" id="editBookAuthor" name="author">
                    <span class="error-msg" id="err-edit-author"></span>
                </div>

                <div class="form-group">
                    <label>Thể loại <span style="color: red;">*</span></label>
                    <input type="text" id="editBookType" name="category">
                    <span class="error-msg" id="err-edit-type"></span>
                </div>

                <div class="form-group">
                    <label>Nhà xuất bản <span style="color: red;">*</span></label>
                    <input type="text" id="editBookPublisher" name="publisher">
                    <span class="error-msg" id="err-edit-publisher"></span>
                </div>

                <div class="form-group">
                    <label>Năm xuất bản <span style="color: red;">*</span></label>
                    <input type="number" id="editBookYear" name="year">
                    <span class="error-msg" id="err-edit-year"></span>
                </div>

                <div class="form-group">
                    <label>Số lượng <span style="color: red;">*</span></label>
                    <input type="number" id="editBookQty" name="quantity">
                    <span class="error-msg" id="err-edit-qty"></span>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="openCancelModal()">Hủy</button>
                <button type="submit" class="btn-save" onclick="showSuccess('Cập nhật thông tin sách thành công')">Cập nhật</button>
            </div>
        </form>
    </div>
</div>
